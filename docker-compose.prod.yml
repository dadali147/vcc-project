version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: vcc-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vcc_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
      interval: 5s
    networks:
      - vcc-network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7
    container_name: vcc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 10
      interval: 5s
    networks:
      - vcc-network

  backend:
    image: bitnamilegacy/java:17
    container_name: vcc-backend
    working_dir: /app
    command: sh -c "sleep 10 && java -jar vcc-admin.jar"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/vcc_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
      JAVA_OPTS: "-Xmx1g -Xms512m"
    ports:
      - "8080:8080"
    volumes:
      - ./vcc-admin.jar:/app/vcc-admin.jar:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vcc-network

  nginx:
    image: nginx:alpine
    container_name: vcc-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./vcc-web-dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - vcc-network

volumes:
  mysql_data:
  redis_data:

networks:
  vcc-network:
    driver: bridge
